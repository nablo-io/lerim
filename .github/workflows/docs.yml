name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "assets/**"
      - "benchmarks/**"
      - "README.md"
      - ".github/workflows/docs.yml"

permissions:
  pages: write
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install docs dependencies
        run: uv venv && uv pip install -e '.[docs]'

      - name: Verify generated benchmark reports and assets
        run: |
          uv run python benchmarks/scripts/build_report_index.py
          uv run python benchmarks/scripts/generate_benchmark_summary_svg.py
          uv run python benchmarks/scripts/generate_support_boundary_svg.py
          git diff --exit-code -- benchmarks/results/reports docs/assets/benchmark-summary.svg docs/assets/support-boundary.svg

      - name: Build docs
        run: uv run mkdocs build --strict

      - name: Validate public benchmark artifacts
        run: uv run python benchmarks/scripts/validate_public_artifacts.py --require-clean --require-tracked-public-files

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

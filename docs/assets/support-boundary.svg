<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="920" viewBox="0 0 1400 920" role="img" aria-labelledby="title desc">
  <title id="title">Agent integration boundary</title>
  <desc id="desc">A visual support boundary separating native trace ingestion, MCP context recall, MCP trace submit or import, and planned plugin or extension paths.</desc>
  <rect width="1400" height="920" fill="#f5f8f5"/>
  <rect x="56" y="52" width="1288" height="816" rx="18" fill="#ffffff" stroke="#d9e5dd" stroke-width="2"/>

  <text x="100" y="122" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700" fill="#17382a">Agent integration boundary</text>
  <text x="100" y="164" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#53645b">MCP recall is useful, but it is not the same as native completed-session capture.</text>

  <g transform="translate(100 216)">
    <rect width="380" height="276" rx="14" fill="#f8fbf8" stroke="#bdd3c7" stroke-width="2"/>
    <circle cx="42" cy="46" r="14" fill="#245f46"/>
    <text x="68" y="54" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#17382a">Native trace ingestion</text>
    <text x="28" y="92" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#53645b">Reads completed local sessions and feeds</text>
    <text x="28" y="116" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#53645b">Lerim&#x27;s compiler.</text>
    <text x="28" y="156" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#17382a">Implemented adapters</text>
    <text x="28" y="192" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#17382a">Claude Code, Codex CLI</text>
    <text x="28" y="224" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#17382a">OpenCode, Cursor, pi</text>
    <text x="28" y="256" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#6a7b72">Adapter does not imply a session-end hook.</text>
  </g>

  <g transform="translate(510 216)">
    <rect width="380" height="276" rx="14" fill="#f8fbf8" stroke="#bdd3c7" stroke-width="2"/>
    <circle cx="42" cy="46" r="14" fill="#5aa17a"/>
    <text x="68" y="54" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#17382a">MCP context recall</text>
    <text x="28" y="92" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#53645b">Lets compatible agents query context</text>
    <text x="28" y="116" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#53645b">tools through the MCP server.</text>
    <text x="28" y="156" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#17382a">15/15 config targets</text>
    <text x="28" y="192" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#17382a">Codex CLI, Claude Code, Cursor</text>
    <text x="28" y="224" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#17382a">OpenCode, Gemini CLI, plus 10 more</text>
    <text x="28" y="256" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#6a7b72">Gemini CLI has 1 context-tool acceptance.</text>
  </g>

  <g transform="translate(920 216)">
    <rect width="380" height="276" rx="14" fill="#f8fbf8" stroke="#bdd3c7" stroke-width="2"/>
    <circle cx="42" cy="46" r="14" fill="#d39a3b"/>
    <text x="68" y="54" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#17382a">MCP trace submit / import</text>
    <text x="28" y="92" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#53645b">Completed traces can be submitted</text>
    <text x="28" y="116" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#53645b">by CLI, JSONL import, or MCP.</text>
    <text x="28" y="156" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#17382a">Supported path</text>
    <text x="28" y="192" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#17382a">lerim trace import</text>
    <text x="28" y="224" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#17382a">lerim_trace_submit</text>
    <text x="28" y="256" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#6a7b72">0 synthetic extraction acceptances</text>
  </g>

  <g transform="translate(100 536)">
    <rect width="586" height="176" rx="14" fill="#fff9ed" stroke="#ead5ab" stroke-width="2"/>
    <text x="28" y="48" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#17382a">Plugin or extension planned</text>
    <text x="28" y="86" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#53645b">OpenClaw plugin, Hermes provider plugin,</text>
    <text x="28" y="112" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#53645b">and pi extension are planned capture paths.</text>
    <text x="28" y="144" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#6a7b72">They are not shipped as lifecycle capture yet.</text>
  </g>

  <g transform="translate(714 536)">
    <rect width="586" height="176" rx="14" fill="#eef6f2" stroke="#bdd3c7" stroke-width="2"/>
    <text x="28" y="48" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#17382a">Acceptance standard</text>
    <text x="28" y="86" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#53645b">A broad support claim needs recall and capture</text>
    <text x="28" y="112" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#53645b">tested against the actual client/config.</text>
    <text x="28" y="138" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#6a7b72">Config writers are evidence, not the whole claim.</text>
  </g>

  <line x1="100" y1="760" x2="1300" y2="760" stroke="#d9e5dd" stroke-width="2"/>
  <text x="100" y="798" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#6a7b72">Current public evidence: 5 native adapters from the registry, 15/15 config targets, local MCP protocol probes,</text>
  <text x="100" y="828" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#6a7b72">3 anonymized client-connection checks, and 1 Gemini CLI context-tool acceptance.</text>
  <text x="100" y="858" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#6a7b72">Use the integration matrix for exact per-agent limitations before making public support claims.</text>
</svg>

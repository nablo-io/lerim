case: source_truth_fact
summary: An external source-of-truth boundary should become a fact record.

expected:
  episode_count: 1
  durable_count: 1
  fact_count: 1
  must_use_tools:
    - read_window
    - save_context
  must_not_use_tools:
    - revise_context
  fact_text_must_include_all:
    - linear
    - ingest
  fact_text_must_include_any:
    - source of truth
    - authoritative
    - consult
  fact_text_must_not_include:
    - docs/
    - file path

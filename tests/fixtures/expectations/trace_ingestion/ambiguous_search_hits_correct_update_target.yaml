  must_not_use_tools: []
  updated_decision_text_must_include_all:
    - lifecycle
    - recovery
    - separate
  updated_decision_text_must_include_any:
    - product state
    - queue runtime
  updated_decision_text_must_not_include:
    - do not fork it
    - duplicate

    - assertion
  fact_text_must_include_all:
    - libvips
    - image
  fact_text_must_include_any:
    - ci
    - transforms
    - dependency
    - environment
    - require
    - missing
  fact_text_must_not_include:
    - debug print
    - helper variable
    - assertion

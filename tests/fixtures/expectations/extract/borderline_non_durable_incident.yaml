case: borderline_non_durable_incident
summary: A one-off stale branch artifact should stay in the episode and not create a durable record.

expected:
  episode_count: 1
  durable_count: 0
  must_use_tools:
    - trace_read
    - create_record
  must_not_use_tools:
    - fetch_records
    - prune
  episode_text_must_include_any:
    - stale
    - fixture
    - branch
    - artifact

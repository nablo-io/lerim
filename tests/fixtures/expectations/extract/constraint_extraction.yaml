case: constraint_extraction
summary: A durable invariant should be stored as a constraint record, not a decision or fact.

expected:
  episode_count: 1
  durable_count: 1
  constraint_count: 1
  must_use_tools:
    - read_trace
    - save_context
  must_not_use_tools:
    - revise_context
  constraint_text_must_include_all:
    - at most one
    - checkpoint
    - session
  constraint_text_must_include_any:
    - identity
    - invariant
  constraint_text_must_not_include:
    - pytest
    - stack trace
    - helper rename

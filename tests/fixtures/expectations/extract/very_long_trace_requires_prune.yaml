case: very_long_trace_requires_prune
summary: A very long trace should stay compressed before the final writes.

expected:
  episode_count: 1
  durable_count: 1
  durable_kind_any_of:
    - constraint
    - decision
    - fact
  read_trace_count_at_least: 4
  note_trace_findings_count_at_least: 1
  prune_trace_reads_count_at_least: 0
  must_use_tools:
    - read_trace
    - note_trace_findings
    - save_context
  must_not_use_tools:
    - revise_context
  durable_text_must_include_all:
    - lease
    - ownership
    - queue
  durable_text_must_include_any:
    - persisted
    - failover
    - worker memory
    - restart
  durable_text_must_not_include:
    - helper rename
    - debug label
    - snapshot formatting
    - cleanup notes

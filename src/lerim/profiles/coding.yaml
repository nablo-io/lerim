id: coding
display_name: Coding Agents
description: Software engineering agent traces and repository workflow sessions.
focus_rules:
  - stable user preferences and repository conventions
  - explicit architecture or workflow decisions with source-supported rationale
  - durable runtime, setup, dependency, path, or environment facts
  - failed paths only when they prevent likely repeated work
  - release or handoff details only when they preserve a still-open future action
reject_as_noise:
  - raw command output without a reusable lesson
  - one-off debug steps
  - temporary implementation details
  - branch-local cleanup
  - stale status observations
evidence_rules:
  - keep file or command evidence when it supports a future-facing rule
  - attach trace line references when available
  - prefer source-of-truth docs over local observations
scope_rules:
  - default to project scope for repository records
  - use domain scope only for non-repo workflow traces
